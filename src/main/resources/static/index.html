<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Bãi Xe IoT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2d; color: white; margin: 0; padding: 0; display: flex; height: 100vh; }
        h1 { text-align: center; color: #00d2ff; text-transform: uppercase; letter-spacing: 2px; }
        
        /* ================= FORM ĐĂNG NHẬP ================= */
        #login-container { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #1e1e2d; position: absolute; z-index: 1000; }
        .login-box { background-color: #27293d; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        .login-box h2 { color: #00d2ff; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #2b3553; background-color: #1e1e2d; color: white; border-radius: 5px; outline: none; box-sizing: border-box; }
        #btnLogin { width: 100%; padding: 12px; background-image: linear-gradient(to bottom left, #e14eca, #ba54f5, #e14eca); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #btnLogin:hover { opacity: 0.8; }

        /* ================= KHUNG GIAO DIỆN CHÍNH (SAU KHI ĐĂNG NHẬP) ================= */
        #app-container { display: none; width: 100%; display: flex; }

        /* ================= THANH MENU BÊN TRÁI (CHỈ ADMIN MỚI THẤY) ================= */
        .sidebar { width: 250px; background-color: #27293d; padding: 20px; box-sizing: border-box; display: none; border-right: 1px solid #444; }
        .sidebar h3 { color: #f39c12; text-align: center; margin-bottom: 30px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .menu-item { display: block; padding: 12px 15px; color: white; text-decoration: none; margin-bottom: 10px; background-color: #1e1e2d; border-radius: 5px; transition: 0.3s; font-weight: bold; cursor: pointer; }
        .menu-item:hover { background-color: #e14eca; }
        .menu-item.active { background-color: #00d2ff; color: #1e1e2d; }

        /* ================= NỘI DUNG DASHBOARD BÊN PHẢI ================= */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .user-info { font-size: 18px; color: #00ff88; font-weight: bold; }
        .btn-logout { padding: 8px 15px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-logout:hover { background: #c82333; }

        /* Phần Bãi Xe & Lịch Sử cũ */
        .dashboard-grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .map-section { flex: 1; min-width: 300px; background: #2b2b40; padding: 20px; border-radius: 10px; }
        #parking-lot { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 20px; }
        .spot { width: 100px; height: 140px; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .empty { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; border: 2px solid #00ff88; }
        .full { background: linear-gradient(135deg, #cb2d3e, #ef473a); color: white; border: 2px solid #ff4444; }
        
        .info-section { flex: 2; min-width: 450px; background: #2b2b40; padding: 20px; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #444; }
        th { color: #00d2ff; }
        .btn-scan { background: #f39c12; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 20px; text-transform: uppercase; }
        .chart-container { margin-top: 30px; background: #1e1e2d; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box">
            <h2>🚀 ĐĂNG NHẬP HỆ THỐNG</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="Tên đăng nhập (VD: admin hoặc baove)">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Mật khẩu">
            </div>
            <button id="btnLogin" onclick="handleLogin()">Vào Việc!</button>
            <p id="login-error" style="color: #ff4d4d; display: none; margin-top: 10px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="app-container">
        
        <div id="sidebar" class="sidebar">
            <h3>⚙️ MENU QUẢN LÝ</h3>
            <div class="menu-item active">🏠 Dashboard Bãi Xe</div>
            <div class="menu-item" onclick="alert('Tính năng đang xây dựng nha sếp!')">👥 Quản Lý Nhân Sự</div>
            <div class="menu-item" onclick="alert('Tính năng đang xây dựng nha sếp!')">💳 Quản Lý Thẻ RFID</div>
            <div class="menu-item" onclick="alert('Tính năng đang xây dựng nha sếp!')">🅿️ Quản Lý Vị Trí Đỗ</div>
        </div>

        <div class="main-content">
            
            <div class="top-bar">
                <h1>🚀 Hệ Thống Quản Lý Bãi Đỗ Xe IoT</h1>
                <div>
                    <span id="welcome-text" class="user-info"></span>
                    <button class="btn-logout" onclick="handleLogout()" style="margin-left: 15px;">🚪 Đăng Xuất</button>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="map-section">
                    <h2>🗺️ Sơ Đồ Bãi Xe</h2>
                    <div id="parking-lot"></div>
                </div>

                <div class="info-section">
                    <button class="btn-scan" onclick="simulateScan()">💳 Giả lập Quẹt Thẻ (CARD_VIP_01)</button>
                    <h2>📋 Lịch Sử Ra Vào Gần Nhất</h2>
                    <input type="text" id="searchInput" onkeyup="filterHistory()" placeholder="🔍 Nhập biển số xe tìm kiếm..." 
                           style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: none; background: #3f3f5a; color: white; outline: none;">
                    <table>
                        <thead>
                            <tr><th>Biển Số</th><th>Giờ Vào</th><th>Giờ Ra</th><th>Trạng Thái</th><th>Thu Tiền</th></tr>
                        </thead>
                        <tbody id="history-table"></tbody>
                    </table>

                    <div class="chart-container">
                        <h2 style="text-align: center; color: #f39c12;">📊 Thống Kê Doanh Thu</h2>
                        <canvas id="revenueChart" height="100"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ================= LOGIC PHÂN QUYỀN (AUTHORIZATION) =================
        checkAuth();

        function checkAuth() {
            const token = localStorage.getItem('iot_parking_token');
            const role = localStorage.getItem('iot_parking_role');
            const username = localStorage.getItem('iot_parking_username');

            if (token) {
                // Đã đăng nhập: Giấu Login, Hiện App
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                
                // Chào hỏi cho lịch sự
                document.getElementById('welcome-text').innerText = `Xin chào, ${role}: ${username}`;

                // XỬ LÝ PHÂN QUYỀN MENU Ở ĐÂY NÀY SẾP!
                if (role === 'ADMIN') {
                    // Sếp tổng thì mở menu cho xài
                    document.getElementById('sidebar').style.display = 'block';
                } else {
                    // Nhân viên thì giấu nhẹm cái menu đi
                    document.getElementById('sidebar').style.display = 'none';
                }

                fetchSpots();
                fetchHistory();
            } else {
                // Chưa đăng nhập: Hiện Login, Giấu App
                document.getElementById('login-container').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        }

        async function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('login-error');

            try {
                const response = await fetch('http://localhost:8080/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (response.ok) {
                    // LƯU CẢ TOKEN VÀ ROLE (QUYỀN) XUỐNG KHO LOCALSTORAGE
                    localStorage.setItem('iot_parking_token', data.token);
                    localStorage.setItem('iot_parking_role', data.role); // Cái này Backend nãy ae mình code nó nhả ra chữ 'ADMIN' hoặc 'STAFF' đấy
                    localStorage.setItem('iot_parking_username', user); 

                    errorMsg.style.display = 'none';
                    checkAuth();
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = data.message || 'Sai tài khoản hoặc mật khẩu!';
                }
            } catch (error) {
                console.error('Lỗi gọi API:', error);
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'Không kết nối được Server!';
            }
        }

        function handleLogout() {
            // Đăng xuất thì dọn sạch kho
            localStorage.removeItem('iot_parking_token');
            localStorage.removeItem('iot_parking_role');
            localStorage.removeItem('iot_parking_username');
            
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            checkAuth();
        }

        // ================= LOGIC DASHBOARD BÃI XE =================
        let myChart = null; 

        function fetchSpots() {
            if(!localStorage.getItem('iot_parking_token')) return; // Chốt chặn bảo vệ server
            fetch('http://localhost:8080/api/spots')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    data.forEach(spot => {
                        let statusClass = spot.isOccupied ? 'full' : 'empty';
                        html += `
                            <div class="spot ${statusClass}">
                                <div>${spot.spotName}</div>
                                <div style="font-size: 14px; margin-top: 10px;">${spot.isOccupied ? 'CÓ XE' : 'TRỐNG'}</div>
                            </div>
                        `;
                    });
                    document.getElementById('parking-lot').innerHTML = html;
                }).catch(err => console.log(err));
        }

        function fetchHistory() {
            if(!localStorage.getItem('iot_parking_token')) return;
            fetch('http://localhost:8080/api/history')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    let revenueData = {};
                    let reversedData = [...data].reverse();
                    reversedData.forEach(row => {
                        let inTime = row.entryTime ? new Date(row.entryTime).toLocaleTimeString('vi-VN') : '-';
                        let outTime = row.exitTime ? new Date(row.exitTime).toLocaleTimeString('vi-VN') : '-';
                        let statusHtml = row.status === 'IN' ? '<span style="color:#00ff88;">Đang gửi</span>' : '<span style="color:#ff4444;">Đã ra</span>';
                        let fee = row.fee ? row.fee + ' đ' : '-';
                        html += `<tr><td>${row.rfidCard.licensePlate}</td><td>${inTime}</td><td>${outTime}</td><td>${statusHtml}</td><td>${fee}</td></tr>`;
                        if (row.status === 'OUT' && row.fee) {
                            let dateKey = new Date(row.exitTime).toLocaleDateString('vi-VN');
                            revenueData[dateKey] = (revenueData[dateKey] || 0) + parseFloat(row.fee);
                        }
                    });
                    document.getElementById('history-table').innerHTML = html;
                    drawChart(Object.keys(revenueData), Object.values(revenueData));
                }).catch(err => console.log(err));
        }

        function drawChart(labels, dataPoints) {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            if (myChart != null) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar', 
                data: { labels: labels, datasets: [{ label: 'Doanh thu (VNĐ)', data: dataPoints, backgroundColor: 'rgba(243, 156, 18, 0.8)', borderColor: 'rgba(243, 156, 18, 1)', borderWidth: 1, borderRadius: 5 }] },
                options: { scales: { y: { beginAtZero: true, ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } }, plugins: { legend: { labels: { color: 'white' } } } }
            });
        }

        function simulateScan() {
            fetch('http://localhost:8080/api/rfid/scan/CARD_VIP_01', { method: 'POST' })
                .then(res => res.json())
                .then(data => fetchHistory())
                .catch(err => console.log(err));
        }

        setInterval(fetchSpots, 2000); 

        function filterHistory() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let tr = document.getElementById("history-table").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let tdPlate = tr[i].getElementsByTagName("td")[0]; 
                if (tdPlate) {
                    tr[i].style.display = (tdPlate.textContent || tdPlate.innerText).toUpperCase().indexOf(input) > -1 ? "" : "none";
                }       
            }
        }
    </script>
</body>
</html>
