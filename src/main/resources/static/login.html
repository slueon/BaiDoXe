<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Bãi Xe IoT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-container" style="display: flex;">
        <div class="login-box">
            <h2>ĐĂNG NHẬP HỆ THỐNG</h2>
            <div class="input-group"><input type="text" id="username" placeholder="Tên đăng nhập"></div>
            <div class="input-group"><input type="password" id="password" placeholder="Mật khẩu"></div>
            <button id="btnLogin" onclick="handleLogin()">Đăng nhập</button>
            <p id="login-error" style="color: #ff4d4d; display: none; margin-top: 10px; font-weight: bold;"></p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
